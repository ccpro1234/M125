<style>
.summary{

 color:#00ff99;

}
@keyframes blink{50%{opacity:.35}}
.dna-row{

}
/* ===== AI ALERT BLINK ===== */

}

.dqn-stat{

<script>

// ===== 🔒 EXPIRE SYSTEM =====
const EXPIRE_DATE = new Date(2026, 2, 28, 0, 0, 0);
// 29 มีนาคม พ.ศ.2569 (ค.ศ.2026)

if(new Date() > EXPIRE_DATE){
  document.body.innerHTML = `
    <div style="
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#000;
      color:#ffd700;
      font-size:22px;
      font-weight:bold;
      text-align:center;">
      ❌ โปรแกรมหมดอายุแล้ว<br>
      หมดอายุวันที่: ${EXPIRE_DATE.toLocaleDateString('th-TH')}
    </div>
  `;
  throw new Error("Program Expired");
}

// ✅ แสดงวันหมดอายุ
document.addEventListener("DOMContentLoaded", ()=>{
  const options = { day: 'numeric', month: 'long', year: 'numeric' };
  const d = EXPIRE_DATE.toLocaleDateString('th-TH', options);

  const year = d.split(" ")[2];
  const formatted = d.replace(year, "พ.ศ. " + year);

  const el = document.getElementById("expireShow");
  if(el){
    el.innerHTML = "⏳ วันหมดอายุ: " + formatted;
  }
});

function login(){
 const u=document.getElementById('user').value;
 const p=document.getElementById('pass').value;
 if(u==="1234" && p==="1234"){
   document.getElementById('loginBox').style.display="none";
   document.getElementById('app').style.display="block";
 }else{
   document.getElementById('err').style.display="block";
 }
}

let history=[]
let STRATEGY_COUNT=24
let last=Array(STRATEGY_COUNT).fill(null)
let dna=Array.from({length:STRATEGY_COUNT},()=>[])

// ===== DQN ENGINE =====
let dqnMode = false
let Q = {}
let epsilon = 0
let alpha = 0.2
let gamma = 0.9
let dqnLastState = null
let dqnLastAction = null

// ===== ADVANCED MEMORY AI =====
let patternMemory = {}
let MEMORY_DEPTH = 4   // ดูย้อนหลัง 4 ตา
let memoryHistory = []
let memoryWin = 0
let memoryLose = 0

// ===== DQN STATS =====
let dqnHistory = []
let dqnWin = 0
let dqnLose = 0


// ===== MEMORY UI RESET =====   👈 วางตรงนี้
function resetMemoryUI(){

  const memoryBox = document.getElementById("memoryInfo")
  const memoryHis = document.getElementById("memoryHistory")
  const memoryStat = document.getElementById("memoryStat")

  if(memoryBox) memoryBox.innerHTML = "รอข้อมูล..."
  if(memoryHis) memoryHis.innerHTML = ""
  if(memoryStat) memoryStat.innerHTML = ""

  // รีเซ็ตเฉพาะตัวแสดงผล
  memoryHistory = []
  memoryWin = 0
  memoryLose = 0
}

function getState(s){
 if(s.length < 8) return null
 return s.slice(-8).join('')
}


function getQ(state){
 if(!Q[state]){
  Q[state] = {P:0, B:0}
 }
 return Q[state]
}

// ===== ADVANCED MEMORY FUNCTIONS =====
function getLongPattern(s){
  if(s.length < MEMORY_DEPTH) return null
  return s.slice(-MEMORY_DEPTH).join('')
}

// 👇 แก้ตรงนี้
function updatePatternMemory(state, result){

  if(!patternMemory[state]){
    patternMemory[state] = {P:0, B:0}
  }

  patternMemory[state][result]++

  localStorage.setItem("patternMemory", JSON.stringify(patternMemory))
}

function getPatternPrediction(state){
  if(!patternMemory[state]) return null
  let data = patternMemory[state]
  return data.P >= data.B ? 'P' : 'B'
}


function chooseAction(state){
 let q = getQ(state)

 if(Math.random() < epsilon){
  return Math.random()<0.5?'P':'B'
 }

 return q.P >= q.B ? 'P' : 'B'
}


// ===== DQN UPDATE ENGINE =====   👈 วางตรงนี้
function updateDQN(result){

  let s = history.filter(x => x !== 'T')
  let state = getState(s)

  if(!state) return

  // =========================
  // 🔴 REWARD BLOCK
  // =========================
  // 👇 แก้ตรงนี้ (ตำแหน่งเดิมเลย)

  if(dqnLastState && dqnLastAction && result !== 'T'){

    let reward = (result === dqnLastAction) ? 1 : -1

    let q = getQ(dqnLastState)

    let nextQ = getQ(state)
    let maxNext = Math.max(nextQ.P, nextQ.B)

    q[dqnLastAction] += alpha * (
      reward + gamma * maxNext - q[dqnLastAction]
    
    )

    // 🔥 Save DQN ทันทีลงเครื่องสมาชิก
    localStorage.setItem("Qmemory", JSON.stringify(Q))
    
    if(reward === 1){
      dqnHistory.push("✅")
      dqnWin++
    }else{
      dqnHistory.push("❌")
      dqnLose++
    }

    if(dqnHistory.length > 50) dqnHistory.shift()
  }

  // =========================
  // 🟢 เลือก action ใหม่ (อยู่หลัง reward เสมอ)
  // =========================

  if(state){
    dqnLastState = state
    dqnLastAction = chooseAction(state)
  }
}


function toggleDQN(){
 dqnMode = !dqnMode

 document.getElementById("dqnStatus").innerHTML =
  "สถานะ: " + (dqnMode ? "<b style='color:#00ff99'>ON</b>" : "<b style='color:#ff4444'>OFF</b>")

 if(!dqnMode){
   const box = document.getElementById("dqnInfo")
   if(box) box.innerHTML = "รอข้อมูล..."
 }
}



function addResult(r){

  // ===== CLEAN HISTORY BEFORE PUSH =====
  let cleanBefore = history.filter(x => x !== 'T')
  let prevLongState = getLongPattern(cleanBefore)

  history.push(r)

  let s = history.filter(x => x !== 'T')

  // ===== 24 STRATEGY LEARN =====
  if (s.length > 1 && r !== 'T') {
    strategyDefs.forEach((def,i)=>{
      if(last[i] !== null){
        dna[i].push(last[i] === r ? '✅' : '❌')
        if(dna[i].length > 50) dna[i].shift()
      }
    })
  }


  /// ===== DQN LEARN =====
if(dqnMode){
  updateDQN(r)
}


  // ===== MEMORY LEARN =====
  if(prevLongState && r !== 'T'){

    // เช็คผลก่อน update
    let predicted = getPatternPrediction(prevLongState)

    if(predicted){
      if(predicted === r){
        memoryHistory.push("✅")
        memoryWin++
      }else{
        memoryHistory.push("❌")
        memoryLose++
      }
      if(memoryHistory.length > 50) memoryHistory.shift()
    }

    // แล้วค่อย update memory
    updatePatternMemory(prevLongState, r)
  }

  render()
}


function undo(){

  if(history.length === 0) return

  // 1️⃣ ลบผลล่าสุด
  history.pop()

  const oldHistory = [...history]

  // =========================
  // 🔴 RESET DQN
  // =========================
  Q = {}
  dqnHistory = []
  dqnWin = 0
  dqnLose = 0
  dqnLastState = null
  dqnLastAction = null

  // =========================
  // 🟢 RESET MEMORY UI COUNTER เท่านั้น
  // =========================
  memoryHistory = []
  memoryWin = 0
  memoryLose = 0

  const prevMode = dqnMode
  dqnMode = false

  history = []

  // =========================
  // 🔁 REPLAY ทุกตาใหม่
  // =========================
  oldHistory.forEach(r=>{

    let cleanBefore = history.filter(x => x !== 'T')
    let prevLongState = getLongPattern(cleanBefore)

    history.push(r)

    // 🔵 rebuild DQN
    updateDQN(r)

    // 🟢 rebuild Memory UI (ไม่แตะ patternMemory)
    if(prevLongState && r !== 'T'){

      let predicted = getPatternPrediction(prevLongState)

      if(predicted){
        if(predicted === r){
          memoryHistory.push("✅")
          memoryWin++
        }else{
          memoryHistory.push("❌")
          memoryLose++
        }

        if(memoryHistory.length > 50) memoryHistory.shift()
      }
    }
  })

  dqnMode = prevMode

  render()
}

function clearAll(){

  // ===== ล้างผลไพ่ทั้งหมด =====
  history = []

  // ===== ล้าง 24 สาย =====
  dna = Array.from({length:STRATEGY_COUNT},()=>[])
  last = Array(STRATEGY_COUNT).fill(null)

  // ===== รีเซ็ต DQN เฉพาะ session =====
  dqnHistory = []
  dqnWin = 0
  dqnLose = 0
  dqnLastState = null
  dqnLastAction = null

  // ❗ ไม่ล้าง Q (AI memory ยังอยู่)

  // ===== รีเซ็ต Memory UI เท่านั้น =====
  memoryHistory = []
  memoryWin = 0
  memoryLose = 0

  const memoryHis = document.getElementById("memoryHistory")
  const memoryStat = document.getElementById("memoryStat")
  const memoryInfo = document.getElementById("memoryInfo")

  if(memoryHis) memoryHis.innerHTML = ""
  if(memoryStat) memoryStat.innerHTML = ""
  if(memoryInfo) memoryInfo.innerHTML = "รอข้อมูล..."

  // ===== รีเซ็ต DQN UI =====
  const dqnInfo = document.getElementById("dqnInfo")
  if(dqnInfo) dqnInfo.innerHTML = "รอข้อมูล..."

// ===== ซ่อนกล่อง AI Assistant =====
const assistantBox = document.getElementById("assistantBox")
if(assistantBox) assistantBox.style.display = "none"

  render()
}



const acc=a=>a.length?Math.round(a.filter(x=>x==='✅').length/a.length*100):0
const lastOf=s=>s[s.length-1]
const opp=s=>s==='B'?'P':'B'
const cnt=(s,x)=>s.filter(v=>v===x).length

function render(){
 stats.textContent=`B:${cnt(history,'B')} | P:${cnt(history,'P')} | T:${cnt(history,'T')}`
 renderBead();renderBig();analyze()
}

function renderBead(){
 bead.innerHTML=""
 history.forEach((r,i)=>{
  let d=document.createElement("div")
  d.className="cell "+r
  d.textContent=r
  d.style.gridColumn=Math.floor(i/6)+1
  d.style.gridRow=i%6+1
  bead.appendChild(d)
 })
}

function renderBig(){
 bigroad.innerHTML=""
 let col=1,row=1,lastR=null,used={}
 history.forEach(r=>{
  if(r==='T')return
  if(lastR===null){col=1;row=1}
  else if(r===lastR){
   if(row<6 && !used[col+','+(row+1)])row++
   else col++
  }else{col++;row=1}
  used[col+','+row]=1
  let d=document.createElement("div")
  d.className="cell "+r
  d.textContent=r
  d.style.gridColumn=col
  d.style.gridRow=row
  bigroad.appendChild(d)
  lastR=r
 })
}

const strategyDefs=[
 ["Majority","ฝั่งรวม",(s)=>cnt(s,'B')>=cnt(s,'P')?'B':'P'],
 ["StreakCut","ตัดยาว",(s)=>s.slice(-3).every(v=>v===lastOf(s))?opp(lastOf(s)):lastOf(s)],
 ["FlipBias","ดูการกลับ",(s)=>cnt(s.slice(-5),'B')%2?'P':'B'],
 ["Window6","หน้าต่าง6",(s)=>cnt(s.slice(-6),'B')>=4?'B':'P'],
 ["Window8","หน้าต่าง8",(s)=>cnt(s.slice(-8),'P')>=5?'P':'B'],
 ["Echo","สะท้อน",(s)=>s.length>2?s[s.length-3]:lastOf(s)],
 ["Inertia","แรงค้าง",(s)=>cnt(s.slice(-4),lastOf(s))>=3?lastOf(s):opp(lastOf(s))],
 ["Parity","เลขคู่",(s)=>s.length%2?lastOf(s):opp(lastOf(s))],
 ["Ratio","อัตราส่วน",(s)=>cnt(s,'B')/(cnt(s,'P')+1)>1.15?'B':'P'],
 ["Pulse","ชีพจร",(s)=>cnt(s.slice(-10),'B')===cnt(s.slice(-10),'P')?lastOf(s):opp(lastOf(s))],

 ["Wave","คลื่น",(s)=>cnt(s.slice(-7),'B')>cnt(s.slice(-7),'P')?'P':'B'],
 ["Rebound","เด้งกลับ",(s)=>s.slice(-2)[0]===s.slice(-2)[1]?opp(lastOf(s)):lastOf(s)],
 ["Density","ความหนา",(s)=>cnt(s.slice(-9),lastOf(s))>=6?opp(lastOf(s)):lastOf(s)],
 ["Shadow","เงาหลัง",(s)=>s.length>1?opp(s[s.length-2]):lastOf(s)],
 ["Drift","ไหล",(s)=>cnt(s.slice(-12),'B')>cnt(s.slice(-12),'P')?'B':'P'],
 ["Anchor","จุดยึด",(s)=>cnt(s.slice(-5),'B')===3?'B':'P'],
 ["Snap","หักฉับ",(s)=>cnt(s.slice(-4),'B')===2?opp(lastOf(s)):lastOf(s)],
 ["Swing","แกว่ง",(s)=>cnt(s.slice(-6),'P')>=4?'B':'P'],
 ["Focus","โฟกัส",(s)=>cnt(s.slice(-3),'B')>=2?'B':'P'],
 ["Mirror2","กระจก2",(s)=>s.length>3?s[s.length-4]:lastOf(s)],
 ["Pressure","แรงกด",(s)=>cnt(s.slice(-8),'B')>=6?'P':'B'],
 ["Tilt","เอียง",(s)=>cnt(s.slice(-10),'P')-cnt(s.slice(-10),'B')>=3?'P':'B'],
 ["Edge","ขอบ",(s)=>cnt(s.slice(-11),'B')%3?'B':'P'],
 ["Stability","เสถียร",(s)=>cnt(s.slice(-6),lastOf(s))>=4?lastOf(s):opp(lastOf(s))]
]
function analyze(){

  let s = history.filter(x => x !== 'T')
  analysisGrid.innerHTML = ""

  // ==============================
// ===== AI BLINK DETECTOR (FINAL) =====
// ==============================

const dqnBox = document.getElementById("dqnBox")
const memoryBoxEl = document.getElementById("memoryBox")

if(dqnBox) dqnBox.classList.remove("blink-dqn")
if(memoryBoxEl) memoryBoxEl.classList.remove("blink-memory")

if(s.length >= 4){

  const historyStr = s.join("")

  const last3 = s.slice(-3).join("")
  const last4 = s.slice(-4).join("")
  const last5 = s.slice(-5).join("")
  const last6 = s.slice(-6).join("")
  const last7 = s.slice(-7).join("")

  // ===== CUT 2–23 (รวมทุกกรณี) =====
  const isDeepCut =
    /(P{2,23}B{2,23})$/.test(historyStr) ||
    /(B{2,23}P{2,23})$/.test(historyStr)

  if(isDeepCut && memoryBoxEl){
    memoryBoxEl.classList.add("blink-memory")
  }

  // ===== 1-1-1 =====
  if(last3 === "PBP" || last3 === "BPB"){
    if(dqnBox) dqnBox.classList.add("blink-dqn")
  }

  // ===== 2-1 =====
  if(last3 === "PPB" || last3 === "BBP"){
    if(dqnBox) dqnBox.classList.add("blink-dqn")
  }

  // ===== PingPong =====
  if(last6 === "PBPBPB" || last6 === "BPBPBP"){
    if(dqnBox) dqnBox.classList.add("blink-dqn")
  }

  // ===== Dragon 5+ =====
  if(last5 === "PPPPP" || last5 === "BBBBB"){
    if(memoryBoxEl) memoryBoxEl.classList.add("blink-memory")
  }
}

  // ==============================
  // ===== PREPARE STRATEGY VAR ===
  // ==============================

 let maxAcc = -1
let pCount = 0
let bCount = 0

// หา % สูงสุดเฉพาะสายที่มีข้อมูลจริง
dna.forEach(d=>{
  if(d.length > 0){
    let a = acc(d)
    if(a > maxAcc) maxAcc = a
  }
})

  // ==============================
  // ===== DQN SECTION ============
  // ==============================

  if(dqnMode){

    const box = document.getElementById("dqnInfo")
    if(!box) return

    let state = getState(s)

    if(!state){
      box.innerHTML = "รอข้อมูล State..."
    } 
    else {

      let q = getQ(state)
     let dqnPick = dqnLastAction ?? "-"

      let totalPlay = dqnWin + dqnLose
      let percent = totalPlay
        ? Math.round(dqnWin / totalPlay * 100)
        : 0

      let advice = ""

      if(percent > 50){
        advice = "🟢 ตานี้ควรเล่นตาม"
      }
      else if(percent < 50){
        advice = "🔴 ตานี้ควรเล่นสวน"
      }
      else if(percent === 50 && totalPlay > 0){
        advice = "🟡 กลางพอดี 50% ผู้เล่นตัดสินใจเอง"
      }
      else{
        advice = "รอข้อมูล..."
      }

      box.innerHTML = `
        State: <b>${state}</b><br>
        Q(P) = ${(q.P ?? 0).toFixed(2)} |
        Q(B) = ${(q.B ?? 0).toFixed(2)}<br>
        เลือก: <b style="color:#00ffcc;font-size:18px">
          ${dqnPick ?? "-"}
        </b>

        <div class="dqn-dna">
          ${dqnHistory.join(" ")}
        </div>

        <div class="dqn-stat">
          ชนะ ${dqnWin} | แพ้ ${dqnLose}
          | ความแม่นยำ ${percent}%
        </div>

        <div style="
          margin-top:8px;
          font-size:16px;
          font-weight:bold;
          color:${percent>50?'#00ff99':percent<50?'#ff4444':'#ffd700'};
        ">
          ${advice}
        </div>
      `

      // ===== ASSISTANT (เฉพาะ 50%) =====

      const assistantBox = document.getElementById("assistantBox")
      const assistantInfo = document.getElementById("assistantInfo")

      if(assistantBox && assistantInfo){

        if(percent === 50 && totalPlay > 0){

          let helperPick = q.P >= q.B ? 'P' : 'B'

          assistantBox.style.display = "block"
          assistantInfo.innerHTML = `
            ⚖️ ความแม่นยำอยู่ที่ 50%<br><br>
            🤖 ผู้ช่วยแนะนำให้แทง:
            <span style="font-size:22px;color:#00ffcc;">
              ${helperPick}
            </span>
          `
        } 
        else {
          assistantBox.style.display = "none"
        }
      }
    }
  }

  // ==============================
  // ===== 24 STRATEGY RENDER =====
  // ==============================

  strategyDefs.forEach((def,i)=>{

    let pick = def[2](s)
    last[i] = pick

   let accuracy = acc(dna[i])

  if(dna[i].length > 0 && accuracy === maxAcc){
      if(pick === 'P') pCount++
      if(pick === 'B') bCount++
    }

    analysisGrid.innerHTML += `
      <div class="analysis">
        <h3>${i+1}) ${def[0]}</h3>
        <div class="desc">${def[1]}</div>
        <div>ตัวแทง:
  <span class="${dna[i].length>0 && accuracy===maxAcc?'best':''}">
    ${pick}
  </span>
</div>
<div class="per">ความแม่นยำ: ${accuracy}%</div>
        <div class="dna-row">${dna[i].join(" ")}</div>
      </div>`
  })

  let total = pCount + bCount

if(maxAcc < 0) maxAcc = 0   // 👈 วางตรงนี้

  summary.innerHTML =
  `📊 <b>เงื่อนไข</b><br>
  สาย % สูงสุด = ${maxAcc}%<br>
  จำนวนสายทั้งหมด = ${total} สาย<br>
  P = ${pCount} สาย<br>
  B = ${bCount} สาย`

  // ==============================
  // ===== MEMORY SECTION =========
  // ==============================

  let memoryBox = document.getElementById("memoryInfo")
  let memoryHis = document.getElementById("memoryHistory")
  let memoryStat = document.getElementById("memoryStat")

  if(memoryBox){

    let longStateNow = getLongPattern(s)
    let mem = longStateNow ? patternMemory[longStateNow] : null

    if(mem){

      let totalMem = mem.P + mem.B
      let percentP = Math.round(mem.P / totalMem * 100)
      let percentB = Math.round(mem.B / totalMem * 100)
      let pick = mem.P >= mem.B ? 'P' : 'B'

      memoryBox.innerHTML = `
        🔁 เค้าไพ่ 4 ตานี้เคยเกิด 
        <b style="color:#ffd700">${totalMem} ครั้ง</b><br>
        P = ${mem.P} (${percentP}%) |
        B = ${mem.B} (${percentB}%)
        <br><br>
        🎯 แนะนำเดิมพัน:
        <b style="color:#00ff99;font-size:18px">
          ${pick}
        </b>
      `

      memoryHis.innerHTML = memoryHistory.join(" ")

      let totalPlay = memoryWin + memoryLose
      let percent = totalPlay
        ? Math.round(memoryWin / totalPlay * 100)
        : 0

      memoryStat.innerHTML =
        `ชนะ ${memoryWin} | แพ้ ${memoryLose} | ความแม่นยำ ${percent}%`

    }else{
      memoryBox.innerHTML = "ยังไม่มีข้อมูลเค้าไพ่"
      memoryHis.innerHTML = ""
      memoryStat.innerHTML = ""
    }
  }

} // ✅ END analyze()

// ===== SAVE AI MEMORY BEFORE REFRESH =====
window.addEventListener("beforeunload", ()=>{
  localStorage.setItem("patternMemory", JSON.stringify(patternMemory))
  localStorage.setItem("Qmemory", JSON.stringify(Q))
})

// ===== INIT MEMBER STORAGE =====
window.addEventListener("load", ()=>{

  const savedPattern = localStorage.getItem("patternMemory")
  if(savedPattern){
    patternMemory = JSON.parse(savedPattern)
  }else{
    patternMemory = {}
  }

  const savedQ = localStorage.getItem("Qmemory")
  if(savedQ){
    Q = JSON.parse(savedQ)
  }else{
    Q = {}
  }

  console.log("Member Storage Ready")
})


</script>
</body>
</html>
